<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym">
<meta name="theme-color" content="#0e0e0e">
<title>Gym</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0e0e0e;
  --surface:#181818;
  --surface-2:#202020;
  --border:#2b2b2b;
  --accent:#c8f060;
  --accent-dim:#c8f06018;
  --text:#f0f0e8;
  --muted:#6d6d66;
  --done-bg:#18230b;
  --done-border:#516f20;
  --blue:#60b8f0;
  --blue-dim:#60b8f012;
  --blue-border:#2a5166;
  --danger:#f07070;
  --danger-dim:#351414;
  --shadow:0 14px 36px rgba(0,0,0,0.35);
}
body {
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  min-height:100vh;
  min-height:-webkit-fill-available;
  overscroll-behavior:none;
}
.app {
  max-width:430px;
  margin:0 auto;
  padding:env(safe-area-inset-top,44px) 0 env(safe-area-inset-bottom,34px);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
.week-strip { padding:16px 16px 0; }
.week-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.week-label-text { font-size:13px; font-weight:600; color:var(--muted); letter-spacing:0.04em; }
.week-arrow {
  width:28px;
  height:28px;
  border-radius:50%;
  border:0.5px solid var(--border);
  background:var(--surface);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:16px;
  color:var(--muted);
  transition:all 0.15s;
}
.week-arrow:active { opacity:0.5; transform:scale(0.9); }
.days-row { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.day-pill {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  padding:8px 2px;
  border-radius:10px;
  cursor:pointer;
  transition:all 0.15s;
  border:0.5px solid transparent;
}
.day-pill:active { opacity:0.6; }
.day-pill.active { background:var(--accent-dim); border-color:var(--accent); }
.dp-name { font-size:10px; color:var(--muted); font-weight:500; }
.dp-num { font-size:16px; font-weight:600; color:var(--text); }
.day-pill.active .dp-name,
.day-pill.active .dp-num,
.day-pill.is-today .dp-num { color:var(--accent); }
.dp-dot { width:4px; height:4px; border-radius:50%; background:transparent; }
.day-pill.has-workout .dp-dot { background:var(--muted); }
.day-pill.active .dp-dot,
.day-pill.all-done .dp-dot { background:var(--accent); }
header { padding:16px 20px 14px; border-bottom:0.5px solid var(--border); }
.header-row { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
.header-copy { min-width:0; }
.day-title { font-size:28px; font-weight:700; letter-spacing:-0.5px; line-height:1; }
.day-title.rest { color:var(--muted); }
.date-sub { font-size:12px; color:var(--muted); margin-top:4px; }
.header-actions { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.progress-pill {
  background:var(--surface);
  border:0.5px solid var(--border);
  border-radius:20px;
  padding:5px 12px;
  font-size:12px;
  font-weight:600;
  color:var(--accent);
}
.add-btn {
  width:28px;
  height:28px;
  border-radius:50%;
  border:0.5px solid var(--border);
  background:var(--surface);
  color:var(--accent);
  font-size:20px;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:all 0.15s;
}
.add-btn:active { opacity:0.6; transform:scale(0.94); }
.prog-bar-wrap { margin-top:10px; height:2px; background:var(--border); border-radius:2px; overflow:hidden; }
.prog-bar { height:100%; background:var(--accent); border-radius:2px; transition:width 0.4s ease; }
.day-layout {
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:12px 16px 0;
}
.exercise-pane {
  flex:2;
  min-height:0;
  display:flex;
  flex-direction:column;
}
.exercise-list {
  flex:1;
  min-height:0;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.section-label {
  font-size:11px;
  font-weight:700;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--muted);
  padding:2px 2px 8px;
}
.rest-screen,
.empty-day-note {
  background:var(--surface);
  border:0.5px solid var(--border);
  border-radius:16px;
  padding:18px;
  text-align:center;
}
.rest-title { font-size:17px; font-weight:700; color:var(--muted); }
.rest-sub,
.empty-day-note {
  font-size:12px;
  color:var(--muted);
  line-height:1.6;
}
.rest-sub { margin-top:6px; }
.empty-day-note { font-size:13px; }
.ex-item {
  background:var(--surface);
  border:0.5px solid var(--border);
  border-radius:16px;
  padding:14px;
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
  transition:all 0.18s;
  user-select:none;
}
.ex-item:active { transform:scale(0.985); }
.ex-item.done {
  background:linear-gradient(180deg, rgba(200,240,96,0.18), rgba(24,35,11,0.9));
  border-color:var(--done-border);
}
.ex-item.readonly { cursor:default; }
.check-circle {
  width:24px;
  height:24px;
  border-radius:50%;
  border:1.5px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.ex-item.done .check-circle {
  background:var(--accent);
  border-color:var(--accent);
}
.checkmark {
  width:9px;
  height:6px;
  border-left:2px solid #0e0e0e;
  border-bottom:2px solid #0e0e0e;
  transform:rotate(-45deg) translateY(-1px);
  opacity:0;
}
.ex-item.done .checkmark { opacity:1; }
.swipe-remove { transition:transform 0.18s ease; touch-action:pan-y; }
.ex-main { flex:1; min-width:0; }
.ex-name { font-size:15px; font-weight:600; letter-spacing:-0.2px; color:var(--text); }
.ex-meta {
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
}
.meta-chip {
  display:inline-flex;
  align-items:center;
  padding:2px 7px;
  border-radius:999px;
  background:rgba(255,255,255,0.04);
  border:0.5px solid var(--border);
  font-size:10px;
  color:var(--muted);
}
.meta-chip.posture { background:#c8f06015; color:#9bc14a; border-color:#324717; }
.meta-chip.added { background:#1b2430; color:#9fc5ff; border-color:#2e4664; }
.ex-remove {
  width:26px;
  height:26px;
  border-radius:50%;
  border:0.5px solid #472020;
  background:var(--danger-dim);
  color:var(--danger);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  cursor:pointer;
  flex-shrink:0;
}
.ex-remove:active { opacity:0.7; }
.complete-banner {
  margin-top:8px;
  padding:12px 16px;
  background:var(--done-bg);
  border:0.5px solid var(--done-border);
  border-radius:12px;
  text-align:center;
  font-size:13px;
  font-weight:600;
  color:var(--accent);
}
.stretch-pane {
  flex:1;
  min-height:120px;
  overflow-y:auto;
  background:var(--surface);
  border:0.5px solid var(--border);
  border-radius:16px;
  padding:12px;
}
.stretch-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
.stretch-title { font-size:14px; font-weight:700; letter-spacing:-0.2px; }
.stretch-sub { font-size:11px; color:var(--muted); }
.stretch-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; }
.stretch-tile {
  position:relative;
  background:var(--surface-2);
  border:0.5px solid var(--border);
  border-radius:12px;
  padding:10px;
  min-width:0;
}
.stretch-tile.done { border-color:var(--done-border); background:rgba(24,35,11,0.7); }
.stretch-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
.stretch-actions { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.stretch-name { font-size:12px; font-weight:600; line-height:1.35; color:var(--text); }
.stretch-name.done { color:var(--accent); }
.stretch-check-btn {
  width:18px;
  height:18px;
  border-radius:50%;
  border:0.5px solid var(--done-border);
  background:#121a0a;
  color:#7ea536;
  font-size:11px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.stretch-check-btn.done { background:var(--accent); color:#0e0e0e; border-color:var(--accent); }
.stretch-info-btn {
  width:18px;
  height:18px;
  border-radius:50%;
  border:0.5px solid var(--blue-border);
  background:rgba(96,184,240,0.12);
  color:var(--blue);
  font-size:11px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex-shrink:0;
}
.stretch-tooltip {
  margin-top:8px;
  font-size:11px;
  line-height:1.45;
  color:#c8d9e4;
  background:var(--blue-dim);
  border:0.5px solid var(--blue-border);
  border-radius:10px;
  padding:8px;
}
.stretch-tooltip-meta { color:var(--blue); margin-top:6px; font-size:10px; }
.history-screen { flex:1; padding:12px 16px 0; overflow-y:auto; }
.week-block { margin-bottom:20px; }
.wk-lbl { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:8px; }
.history-day { background:var(--surface); border:0.5px solid var(--border); border-radius:12px; padding:11px 14px; margin-bottom:5px; }
.history-day-head { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:5px; }
.history-day-name { font-size:13px; font-weight:600; }
.hbadge { font-size:10px; padding:2px 8px; border-radius:5px; font-weight:500; white-space:nowrap; }
.badge-full { background:#1a2a0a; color:var(--accent); }
.badge-partial { background:#2a1a0a; color:#f0a060; }
.badge-skipped { background:#2a0a0a; color:#f06060; }
.badge-rest,
.badge-empty { background:var(--border); color:var(--muted); }
.history-exes { display:flex; flex-wrap:wrap; gap:3px; }
.history-ex { font-size:10px; padding:2px 6px; border-radius:4px; background:var(--bg); color:var(--muted); border:0.5px solid var(--border); }
.history-ex.done { background:var(--done-bg); color:#8ab040; border-color:var(--done-border); }
.empty-history { text-align:center; padding:60px 24px; color:var(--muted); font-size:14px; line-height:1.7; }
.bottom-nav { display:flex; padding:10px 16px; border-top:0.5px solid var(--border); gap:6px; margin-top:12px; }
.nav-btn {
  flex:1;
  padding:11px;
  border-radius:10px;
  border:0.5px solid var(--border);
  background:var(--surface);
  color:var(--muted);
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  text-align:center;
  transition:all 0.15s;
}
.nav-btn:active { opacity:0.6; }
.nav-btn.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }
.reset-btn {
  margin:8px 16px 0;
  padding:11px;
  border-radius:10px;
  border:0.5px solid #3a1a1a;
  background:#1a0a0a;
  color:#f06060;
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  text-align:center;
  width:calc(100% - 32px);
}
.reset-btn:active { opacity:0.6; }
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.82);
  display:none;
  align-items:flex-end;
  z-index:100;
}
.modal.show { display:flex; }
.modal-sheet {
  width:100%;
  max-width:430px;
  margin:0 auto;
  background:#151515;
  border-radius:24px 24px 0 0;
  border:0.5px solid var(--border);
  border-bottom:0;
  padding:18px 16px calc(16px + env(safe-area-inset-bottom,0px));
  max-height:76vh;
  overflow-y:auto;
  box-shadow:var(--shadow);
}
.modal-handle { width:42px; height:4px; border-radius:999px; background:#303030; margin:0 auto 14px; }
.modal-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:14px; }
.modal-title { font-size:18px; font-weight:700; letter-spacing:-0.3px; }
.modal-sub { font-size:12px; line-height:1.5; color:var(--muted); margin-top:5px; }
.modal-close {
  width:30px;
  height:30px;
  border-radius:50%;
  border:0.5px solid var(--border);
  background:var(--surface);
  color:var(--muted);
  font-size:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.picker-list { display:flex; flex-direction:column; gap:10px; }
.picker-card { background:var(--surface); border:0.5px solid var(--border); border-radius:14px; padding:12px; }
.picker-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
.picker-name { font-size:14px; font-weight:600; }
.picker-day { font-size:10px; padding:2px 7px; border-radius:999px; background:#1c2731; color:#9ec7ff; border:0.5px solid #2b4256; }
.picker-meta { font-size:11px; color:var(--muted); margin-top:4px; }
.picker-add {
  margin-top:10px;
  width:100%;
  padding:10px 12px;
  border-radius:10px;
  border:0.5px solid var(--border);
  background:var(--surface-2);
  color:var(--text);
  font-size:12px;
  font-weight:600;
  cursor:pointer;
}
.picker-add:active { opacity:0.7; }
.empty-picker {
  padding:22px 16px;
  text-align:center;
  color:var(--muted);
  background:var(--surface);
  border:0.5px solid var(--border);
  border-radius:14px;
  font-size:13px;
  line-height:1.6;
}
@media (max-width:380px) {
  .stretch-grid { grid-template-columns:1fr; }
  .header-actions { gap:6px; }
  .progress-pill { padding:5px 10px; }
}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const ROUTINE = {
  1:{name:'Monday',exercises:[
    {id:'mon1',name:'Bench flat',sets:'4 sets',tag:''},
    {id:'mon2',name:'Pull up',sets:'4 sets',tag:''},
    {id:'mon3',name:'Cable Y-raise',sets:'4 sets',tag:'posture'},
    {id:'mon4',name:'Tricep',sets:'4 sets',tag:''},
  ]},
  2:{name:'Tuesday',rest:true},
  3:{name:'Wednesday',exercises:[
    {id:'wed1',name:'Chest fly',sets:'4 sets',tag:''},
    {id:'wed2',name:'Cable Y-raise',sets:'4 sets',tag:'posture'},
    {id:'wed3',name:'Leg press / squat',sets:'4 sets',tag:''},
    {id:'wed4',name:'Romanian deadlift',sets:'4 sets',tag:'posture'},
  ]},
  4:{name:'Thursday',rest:true},
  5:{name:'Friday',exercises:[
    {id:'fri1',name:'Bench flat',sets:'4 sets',tag:''},
    {id:'fri2',name:'Pull up',sets:'4 sets',tag:''},
    {id:'fri3',name:'Shoulder press',sets:'3 sets',tag:''},
    {id:'fri4',name:'Hip thrust',sets:'4 sets',tag:'posture'},
    {id:'fri5',name:'Tricep',sets:'3 sets',tag:''},
  ]},
  6:{name:'Saturday',exercises:[
    {id:'sat1',name:'Dead hang',sets:'decompression',tag:'posture'},
    {id:'sat2',name:'DB deadlift',sets:'4 sets',tag:''},
    {id:'sat3',name:'Zone 2 cardio',sets:'40 min',tag:''},
    {id:'sat4',name:'Hanging leg raise',sets:'4 sets · pelvic tuck',tag:'posture'},
    {id:'sat5',name:'Sauna',sets:'25 min',tag:''},
  ]},
  0:{name:'Sunday',exercises:[
    {id:'sun1',name:'Lat raise + uprise',sets:'4 sets',tag:''},
    {id:'sun2',name:'Bent over row',sets:'4 sets',tag:''},
    {id:'sun3',name:'Bicep',sets:'6+ sets',tag:''},
    {id:'sun4',name:'Calf raise',sets:'4 sets',tag:''},
  ]},
};

const STRETCH = [
  {id:'stretch1',name:'Foam roller hip flexor release',desc:'Lie with foam roller under tailbone or sacrum. Let hips sink and relax fully. Breathe deeply.',dur:'2 min',target:'Hip flexors · APT'},
  {id:'stretch2',name:'Thoracic extension over roller',desc:'Roller across mid-back around T4 to T8. Arms crossed or behind head. Extend over it slowly segment by segment.',dur:'2 min',target:'Thoracic · kyphosis'},
  {id:'stretch3',name:'Couch stretch',desc:'Rear foot up on sofa or wall, front foot forward. Keep torso upright and squeeze the glute of the back leg.',dur:'60s each side',target:'Hip flexors · tight hips'},
  {id:'stretch4',name:'90/90 hip stretch',desc:'Sit with both knees at 90 degrees, one in front and one to the side. Lean forward over the front shin.',dur:'60s each side',target:'Hip rotation'},
  {id:'stretch5',name:'Chin tuck',desc:'Lying flat, draw chin straight back without tipping down. Hold 5 seconds, release, then repeat.',dur:'3 x 10 reps',target:'Forward head · neck'},
  {id:'stretch6',name:'Doorway pec stretch',desc:'Forearms on the doorframe, then lean through gently. Targets pec minor pulling shoulders forward.',dur:'3 x 30s',target:'Pec minor · kyphosis'},
  {id:'stretch7',name:'Figure 4 glute stretch',desc:'Lying on your back, cross ankle over the opposite knee and pull legs toward the chest.',dur:'60s each side',target:'Glutes · tight hips'},
];
const DEFAULT_STRETCH_IDS = ['stretch1','stretch2','stretch3','stretch5','stretch6'];
const DEFAULT_STRETCH_SET = new Set(DEFAULT_STRETCH_IDS);

const DS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const STORAGE_KEY = 'gymState4';
const LEGACY_KEY = 'gymState3';
const WEEK_ORDER = [1,2,3,4,5,6,0];

let selDate = new Date();
selDate.setHours(0,0,0,0);
let weekOff = 0;
let view = 'workout';
let addModalOpen = false;
let openStretchInfoId = null;

function dk(d){
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function legacyUtcDayKey(d){ return d.toISOString().split('T')[0]; }
function dayKeyCandidates(d){
  const primary = dk(d);
  const legacy = legacyUtcDayKey(d);
  return primary === legacy ? [primary] : [primary, legacy];
}
function fromDayKey(dayKey){
  const [y,m,d] = dayKey.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function ws(d,o){ const start = new Date(d); start.setHours(0,0,0,0); start.setDate(start.getDate()-start.getDay()+(o*7)); return start; }
function esc(text){ return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function newState(){ return { checks:{}, added:{}, removed:{}, stretchChecks:{}, stretchRemoved:{}, addedStretches:{} }; }
function normalizedState(raw){
  if(!raw || typeof raw !== 'object' || Array.isArray(raw)) return newState();

  if(raw.checks || raw.added || raw.removed || raw.stretchChecks || raw.stretchRemoved || raw.addedStretches){
    return {
      checks: raw.checks && typeof raw.checks === 'object' ? raw.checks : {},
      added: raw.added && typeof raw.added === 'object' ? raw.added : {},
      removed: raw.removed && typeof raw.removed === 'object' ? raw.removed : {},
      stretchChecks: raw.stretchChecks && typeof raw.stretchChecks === 'object' ? raw.stretchChecks : {},
      stretchRemoved: raw.stretchRemoved && typeof raw.stretchRemoved === 'object' ? raw.stretchRemoved : {},
      addedStretches: raw.addedStretches && typeof raw.addedStretches === 'object' ? raw.addedStretches : {},
    };
  }

  // Legacy format: {dateKey:{exerciseId:boolean}}
  return { checks: raw, added:{}, removed:{}, stretchChecks:{}, stretchRemoved:{}, addedStretches:{} };
}
function ls(){
  try {
    const next = localStorage.getItem(STORAGE_KEY);
    if(next) return normalizedState(JSON.parse(next));
    const legacy = localStorage.getItem(LEGACY_KEY);
    if(legacy) return normalizedState(JSON.parse(legacy));
  } catch (error) {}
  return newState();
}
function ss(state){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function ensureMap(obj,key){ if(!obj[key] || typeof obj[key] !== 'object' || Array.isArray(obj[key])) obj[key] = {}; return obj[key]; }
function ensureList(obj,key){ if(!Array.isArray(obj[key])) obj[key] = []; return obj[key]; }
function getDateMap(container,date){
  for(const key of dayKeyCandidates(date)) {
    const value = container[key];
    if(value && typeof value === 'object' && !Array.isArray(value)) return value;
  }
