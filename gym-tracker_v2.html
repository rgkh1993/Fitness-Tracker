<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym">
<meta name="theme-color" content="#0e0e0e">
<title>Gym</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0e0e0e;
  --surface:#181818;
  --surface-2:#202020;
  --border:#2b2b2b;
  --accent:#c8f060;
  --accent-dim:#c8f06018;
  --text:#f0f0e8;
  --muted:#6d6d66;
  --done-bg:#18230b;
  --done-border:#516f20;
  --blue:#60b8f0;
  --blue-dim:#60b8f012;
  --blue-border:#2a5166;
  --danger:#f07070;
  --danger-dim:#351414;
  --shadow:0 14px 36px rgba(0,0,0,0.35);
}
body {
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
  min-height:100vh;
  min-height:-webkit-fill-available;
  overscroll-behavior:none;
}
.app {
  max-width:430px;
  margin:0 auto;
  padding:env(safe-area-inset-top,44px) 0 env(safe-area-inset-bottom,34px);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
.week-strip { padding:16px 16px 0; }
.week-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.week-label-text { font-size:13px; font-weight:600; color:var(--muted); letter-spacing:0.04em; }
.week-arrow {
  width:28px;
  height:28px;
  border-radius:50%;
  border:0.5px solid var(--border);
  background:var(--surface);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:16px;
  color:var(--muted);
  transition:all 0.15s;
}
.week-arrow:active { opacity:0.5; transform:scale(0.9); }
.days-row { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.day-pill {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  padding:8px 2px;
  border-radius:10px;
  cursor:pointer;
  transition:all 0.15s;
  border:0.5px solid transparent;
}
.day-pill:active { opacity:0.6; }
.day-pill.active { background:var(--accent-dim); border-color:var(--accent); }
.dp-name { font-size:10px; color:var(--muted); font-weight:500; }
.dp-num { font-size:16px; font-weight:600; color:var(--text); }
.day-pill.active .dp-name,
.day-pill.active .dp-num,
.day-pill.is-today .dp-num { color:var(--accent); }
.dp-dot { width:4px; height:4px; border-radius:50%; background:transparent; }
.day-pill.has-workout .dp-dot { background:var(--muted); }
.day-pill.active .dp-dot,
.day-pill.all-done .dp-dot { background:var(--accent); }
header { padding:16px 20px 14px; border-bottom:0.5px solid var(--border); }
.header-row { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
.header-copy { min-width:0; }
.day-title { font-size:28px; font-weight:700; letter-spacing:-0.5px; line-height:1; }
.day-title.rest { color:var(--muted); }
.date-sub { font-size:12px; color:var(--muted); margin-top:4px; }
.header-actions { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.progress-pill {
  background:var(--surface);
  border:0.5px solid var(--border);
  border-radius:20px;
  padding:5px 12px;
  font-size:12px;
  font-weight:600;
  color:var(--accent);
}
.add-btn {
  width:28px;
  height:28px;
  border-radius:50%;
  border:0.5px solid var(--border);
  background:var(--surface);
  color:var(--accent);
  font-size:20px;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:all 0.15s;
}
.add-btn:active { opacity:0.6; transform:scale(0.94); }
.prog-bar-wrap { margin-top:10px; height:2px; background:var(--border); border-radius:2px; overflow:hidden; }
.prog-bar { height:100%; background:var(--accent); border-radius:2px; transition:width 0.4s ease; }
.day-layout {
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:12px 16px 0;
}
.exercise-pane {
  flex:2;
  min-height:0;
  display:flex;
  flex-direction:column;
}
.exercise-list {
  flex:1;
  min-height:0;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.section-label {
  font-size:11px;
  font-weight:700;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--muted);
  padding:2px 2px 8px;
}
.rest-screen,
.empty-day-note {
  background:var(--surface);
  border:0.5px solid var(--border);
  border-radius:16px;
  padding:18px;
  text-align:center;
}
.rest-title { font-size:17px; font-weight:700; color:var(--muted); }
.rest-sub,
.empty-day-note {
  font-size:12px;
  color:var(--muted);
  line-height:1.6;
}
.rest-sub { margin-top:6px; }
.empty-day-note { font-size:13px; }
.ex-item {
  background:var(--surface);
  border:0.5px solid var(--border);
  border-radius:16px;
  padding:14px;
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
  transition:all 0.18s;
  user-select:none;
}
.ex-item:active { transform:scale(0.985); }
.ex-item.done {
  background:linear-gradient(180deg, rgba(200,240,96,0.18), rgba(24,35,11,0.9));
  border-color:var(--done-border);
}
.ex-item.readonly { cursor:default; }
.check-circle {
  width:24px;
  height:24px;
  border-radius:50%;
  border:1.5px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.ex-item.done .check-circle {
  background:var(--accent);
  border-color:var(--accent);
}
.checkmark {
  width:9px;
  height:6px;
  border-left:2px solid #0e0e0e;
  border-bottom:2px solid #0e0e0e;
  transform:rotate(-45deg) translateY(-1px);
  opacity:0;
}
.ex-item.done .checkmark { opacity:1; }
.swipe-remove { transition:transform 0.18s ease; touch-action:pan-y; }
.ex-main { flex:1; min-width:0; }
.ex-name { font-size:15px; font-weight:600; letter-spacing:-0.2px; color:var(--text); }
.ex-meta {
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
}
.meta-chip {
  display:inline-flex;
  align-items:center;
  padding:2px 7px;
  border-radius:999px;
  background:rgba(255,255,255,0.04);
  border:0.5px solid var(--border);
  font-size:10px;
  color:var(--muted);
}
.meta-chip.posture { background:#c8f06015; color:#9bc14a; border-color:#324717; }
.meta-chip.added { background:#1b2430; color:#9fc5ff; border-color:#2e4664; }
.ex-remove {
  width:26px;
  height:26px;
  border-radius:50%;
  border:0.5px solid #472020;
  background:var(--danger-dim);
  color:var(--danger);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  cursor:pointer;
  flex-shrink:0;
}
.ex-remove:active { opacity:0.7; }
.complete-banner {
  margin-top:8px;
  padding:12px 16px;
  background:var(--done-bg);
  border:0.5px solid var(--done-border);
  border-radius:12px;
  text-align:center;
  font-size:13px;
  font-weight:600;
  color:var(--accent);
}
.stretch-pane {
  flex:1;
  min-height:120px;
  overflow-y:auto;
  background:var(--surface);
  border:0.5px solid var(--border);
  border-radius:16px;
  padding:12px;
}
.stretch-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
.stretch-title { font-size:14px; font-weight:700; letter-spacing:-0.2px; }
.stretch-sub { font-size:11px; color:var(--muted); }
.stretch-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; }
.stretch-tile {
  position:relative;
  background:var(--surface-2);
  border:0.5px solid var(--border);
  border-radius:12px;
  padding:10px;
  min-width:0;
}
.stretch-tile.done { border-color:var(--done-border); background:rgba(24,35,11,0.7); }
.stretch-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
.stretch-actions { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.stretch-name { font-size:12px; font-weight:600; line-height:1.35; color:var(--text); }
.stretch-name.done { color:var(--accent); }
.stretch-check-btn {
  width:18px;
  height:18px;
  border-radius:50%;
  border:0.5px solid var(--done-border);
  background:#121a0a;
  color:#7ea536;
  font-size:11px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.stretch-check-btn.done { background:var(--accent); color:#0e0e0e; border-color:var(--accent); }
.stretch-timer-btn {
  width:18px;
  height:18px;
  border-radius:50%;
  border:0.5px solid #4a5a3a;
  background:rgba(200,240,96,0.12);
  color:var(--accent);
  font-size:10px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex-shrink:0;
}
.stretch-info-btn {
  width:18px;
  height:18px;
  border-radius:50%;
  border:0.5px solid var(--blue-border);
  background:rgba(96,184,240,0.12);
  color:var(--blue);
  font-size:11px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex-shrink:0;
}
.stretch-tooltip {
  margin-top:8px;
  font-size:11px;
  line-height:1.45;
  color:#c8d9e4;
  background:var(--blue-dim);
  border:0.5px solid var(--blue-border);
  border-radius:10px;
  padding:8px;
}
.stretch-tooltip-meta { color:var(--blue); margin-top:6px; font-size:10px; }
.timer-modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.82);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:101;
}
.timer-modal.show { display:flex; }
.timer-card {
  background:#151515;
  border:0.5px solid var(--border);
  border-radius:20px;
  padding:32px;
  max-width:300px;
  text-align:center;
  box-shadow:var(--shadow);
}
.timer-name { font-size:14px; font-weight:600; color:var(--text); margin-bottom:16px; }
.timer-display {
  font-size:56px;
  font-weight:700;
  color:var(--accent);
  font-family:'Monaco','Menlo','Courier New',monospace;
  margin:16px 0;
  letter-spacing:2px;
}
.timer-controls { display:flex; gap:8px; margin-top:24px; justify-content:center; }
.timer-btn {
  padding:10px 16px;
  border-radius:10px;
  border:0.5px solid var(--border);
  background:var(--surface);
  color:var(--text);
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.15s;
}
.timer-btn:active { opacity:0.7; }
.timer-btn.primary {
  background:var(--accent);
  color:#0e0e0e;
  border-color:var(--accent);
}
.timer-btn.cancel { color:var(--danger); border-color:var(--danger); }
.history-screen { flex:1; padding:12px 16px 0; overflow-y:auto; }
.week-block { margin-bottom:20px; }
.wk-lbl { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:8px; }
.history-day { background:var(--surface); border:0.5px solid var(--border); border-radius:12px; padding:11px 14px; margin-bottom:5px; }
.history-day-head { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:5px; }
.history-day-name { font-size:13px; font-weight:600; }
.hbadge { font-size:10px; padding:2px 8px; border-radius:5px; font-weight:500; white-space:nowrap; }
.badge-full { background:#1a2a0a; color:var(--accent); }
.badge-partial { background:#2a1a0a; color:#f0a060; }
.badge-skipped { background:#2a0a0a; color:#f06060; }
.badge-rest,
.badge-empty { background:var(--border); color:var(--muted); }
.history-exes { display:flex; flex-wrap:wrap; gap:3px; }
.history-ex { font-size:10px; padding:2px 6px; border-radius:4px; background:var(--bg); color:var(--muted); border:0.5px solid var(--border); }
.history-ex.done { background:var(--done-bg); color:#8ab040; border-color:var(--done-border); }
.empty-history { text-align:center; padding:60px 24px; color:var(--muted); font-size:14px; line-height:1.7; }
.bottom-nav { display:flex; padding:10px 16px; border-top:0.5px solid var(--border); gap:6px; margin-top:12px; }
.nav-btn {
  flex:1;
  padding:11px;
  border-radius:10px;
  border:0.5px solid var(--border);
  background:var(--surface);
  color:var(--muted);
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  text-align:center;
  transition:all 0.15s;
}
.nav-btn:active { opacity:0.6; }
.nav-btn.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent); }
.reset-btn {
  margin:8px 16px 0;
  padding:11px;
  border-radius:10px;
  border:0.5px solid #3a1a1a;
  background:#1a0a0a;
  color:#f06060;
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  text-align:center;
  width:calc(100% - 32px);
}
.reset-btn:active { opacity:0.6; }
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.82);
  display:none;
  align-items:flex-end;
  z-index:100;
}
.modal.show { display:flex; }
.modal-sheet {
  width:100%;
  max-width:430px;
  margin:0 auto;
  background:#151515;
  border-radius:24px 24px 0 0;
  border:0.5px solid var(--border);
  border-bottom:0;
  padding:18px 16px calc(16px + env(safe-area-inset-bottom,0px));
  max-height:76vh;
  overflow-y:auto;
  box-shadow:var(--shadow);
}
.modal-handle { width:42px; height:4px; border-radius:999px; background:#303030; margin:0 auto 14px; }
.modal-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:14px; }
.modal-title { font-size:18px; font-weight:700; letter-spacing:-0.3px; }
.modal-sub { font-size:12px; line-height:1.5; color:var(--muted); margin-top:5px; }
.modal-close {
  width:30px;
  height:30px;
  border-radius:50%;
  border:0.5px solid var(--border);
  background:var(--surface);
  color:var(--muted);
  font-size:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.picker-list { display:flex; flex-direction:column; gap:10px; }
.picker-card { background:var(--surface); border:0.5px solid var(--border); border-radius:14px; padding:12px; }
.picker-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
.picker-name { font-size:14px; font-weight:600; }
.picker-day { font-size:10px; padding:2px 7px; border-radius:999px; background:#1c2731; color:#9ec7ff; border:0.5px solid #2b4256; }
.picker-meta { font-size:11px; color:var(--muted); margin-top:4px; }
.picker-add {
  margin-top:10px;
  width:100%;
  padding:10px 12px;
  border-radius:10px;
  border:0.5px solid var(--border);
  background:var(--surface-2);
  color:var(--text);
  font-size:12px;
  font-weight:600;
  cursor:pointer;
}
.picker-add:active { opacity:0.7; }
.empty-picker {
  padding:22px 16px;
  text-align:center;
  color:var(--muted);
  background:var(--surface);
  border:0.5px solid var(--border);
  border-radius:14px;
  font-size:13px;
  line-height:1.6;
}
@media (max-width:380px) {
  .stretch-grid { grid-template-columns:1fr; }
  .header-actions { gap:6px; }
  .progress-pill { padding:5px 10px; }
}
</style>
</head>

const STRETCH = [
  {id:'stretch1',name:'Foam roller hip flexor release',desc:'Lie with foam roller under tailbone or sacrum. Let hips sink and relax fully. Breathe deeply.',dur:'2 min',target:'Hip flexors · APT'},

  {id:'stretch4',name:'90/90 hip stretch',desc:'Sit with both knees at 90 degrees, one in front and one to the side. Lean forward over the front shin.',dur:'60s each side',target:'Hip rotation'},
  {id:'stretch5',name:'Chin tuck',desc:'Lying flat, draw chin straight back without tipping down. Hold 5 seconds, release, then repeat.',dur:'3 x 10 reps',target:'Forward head · neck'},

  {id:'stretch7',name:'Figure 4 glute stretch',desc:'Lying on your back, cross ankle over the opposite knee and pull legs toward the chest.',dur:'60s each side',target:'Glutes · tight hips'},
];

const DS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function parseDuration(durStr) {
  if(!durStr || typeof durStr !== 'string') return null;
  const str = durStr.toLowerCase().trim();
  
  // Match "X min" or "Xmin"
  let match = str.match(/(\d+)\s*min/);
  if(match) return parseInt(match[1]) * 60;
  
  // Match "Xs" or "X sec"
  match = str.match(/(\d+)\s*(?:sec|s)/);
  if(match) return parseInt(match[1]);
  
  // Match "X x Y sec" (e.g., "3 x 30s") - multiply them
  match = str.match(/(\d+)\s*x\s*(\d+)\s*(?:sec|s)/);
  if(match) return parseInt(match[1]) * parseInt(match[2]);
  
  return null;
}

function formatSeconds(secs) {
  const mins = Math.floor(secs / 60);
  const s = secs % 60;
  return `${mins}:${String(s).padStart(2,'0')}`;
}
const STORAGE_KEY = 'gymState4';
const LEGACY_KEYS = ['gymState3','gymState'];
const WEEK_ORDER = [1,2,3,4,5,6,0];

let selDate = new Date();
selDate.setHours(0,0,0,0);
let weekOff = 0;
let view = 'workout';
let addModalOpen = false;
let openStretchInfoId = null;
let timerModalOpen = false;
let timerStretchId = null;
let timerSeconds = 0;
let timerInterval = null;
let timerActive = false;

function dk(d){
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function legacyUtcDayKey(d){ return d.toISOString().split('T')[0]; }
function dayKeyCandidates(d){
  const primary = dk(d);
  const legacy = legacyUtcDayKey(d);
  return primary === legacy ? [primary] : [primary, legacy];
}
function fromDayKey(dayKey){
  const [y,m,d] = dayKey.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function ws(d,o){
  const start = new Date(d);
  start.setHours(0,0,0,0);
  const dayOffset = (start.getDay() + 6) % 7;
  start.setDate(start.getDate() - dayOffset + (o * 7));
  return start;
}
function esc(text){ return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function newState(){ return { checks:{}, added:{}, removed:{}, stretchChecks:{}, stretchRemoved:{}, addedStretches:{} }; }
function normalizedState(raw){
  if(!raw || typeof raw !== 'object' || Array.isArray(raw)) return newState();

  if(raw.checks || raw.added || raw.removed || raw.stretchChecks || raw.stretchRemoved || raw.addedStretches){
    return {
      checks: raw.checks && typeof raw.checks === 'object' ? raw.checks : {},
      added: raw.added && typeof raw.added === 'object' ? raw.added : {},
      removed: raw.removed && typeof raw.removed === 'object' ? raw.removed : {},
      stretchChecks: raw.stretchChecks && typeof raw.stretchChecks === 'object' ? raw.stretchChecks : {},
      stretchRemoved: raw.stretchRemoved && typeof raw.stretchRemoved === 'object' ? raw.stretchRemoved : {},
      addedStretches: raw.addedStretches && typeof raw.addedStretches === 'object' ? raw.addedStretches : {},
    };
  }

  // Legacy format: {dateKey:{exerciseId:boolean}}
  return { checks: raw, added:{}, removed:{}, stretchChecks:{}, stretchRemoved:{}, addedStretches:{} };
}
function normalizeClassicState(raw){
  const state = newState();
  if(!raw || typeof raw !== 'object' || Array.isArray(raw)) return state;

  Object.entries(raw).forEach(([dateKey, dayState]) => {
    if(!dayState || typeof dayState !== 'object' || Array.isArray(dayState)) return;

    if(dayState.completed && typeof dayState.completed === 'object' && !Array.isArray(dayState.completed)) {
      state.checks[dateKey] = { ...dayState.completed };
    }

    if(Array.isArray(dayState.exercises) && dayState.exercises.length) {
      state.added[dateKey] = dayState.exercises.map((exercise, index) => ({
        instanceId: exercise.id || `legacy_added_${dateKey}_${index}`,
        name: exercise.name || 'Exercise',
        sets: exercise.sets || '',
        tag: exercise.tag || '',
      }));
    }
  });

  return state;
}
function parseStoredState(storageKey, rawValue){
  if(!rawValue) return null;

  try {
    const parsed = JSON.parse(rawValue);
    return storageKey === 'gymState' ? normalizeClassicState(parsed) : normalizedState(parsed);
  } catch (error) {
    return null;
  }
}
function mergeEntryLists(currentList, incomingList){
  const next = Array.isArray(currentList) ? [...currentList] : [];
  if(!Array.isArray(incomingList) || !incomingList.length) return next;

  const seen = new Set(next.map(item => {
    if(item && typeof item === 'object') return `obj:${item.instanceId || item.id || JSON.stringify(item)}`;
    return `primitive:${String(item)}`;
  }));

  incomingList.forEach(item => {
    const key = item && typeof item === 'object'
      ? `obj:${item.instanceId || item.id || JSON.stringify(item)}`
      : `primitive:${String(item)}`;
    if(seen.has(key)) return;
    seen.add(key);
    next.push(item);
  });

  return next;
}
function mergeDateObjectMaps(currentMap, incomingMap){
  return {
    ...(incomingMap && typeof incomingMap === 'object' && !Array.isArray(incomingMap) ? incomingMap : {}),
    ...(currentMap && typeof currentMap === 'object' && !Array.isArray(currentMap) ? currentMap : {}),
  };
}
function mergeStates(currentState, incomingState){
  const merged = {
    checks: { ...currentState.checks },
    added: { ...currentState.added },
    removed: { ...currentState.removed },
    stretchChecks: { ...currentState.stretchChecks },
    stretchRemoved: { ...currentState.stretchRemoved },
    addedStretches: { ...currentState.addedStretches },
  };

  ['checks','stretchChecks'].forEach(container => {
    Object.entries(incomingState[container] || {}).forEach(([dateKey, value]) => {
      merged[container][dateKey] = mergeDateObjectMaps(merged[container][dateKey], value);
    });
  });

  ['added','removed','stretchRemoved','addedStretches'].forEach(container => {
    Object.entries(incomingState[container] || {}).forEach(([dateKey, value]) => {
      merged[container][dateKey] = mergeEntryLists(merged[container][dateKey], value);
    });
  });

  return merged;
}
function ls(){
  let state = newState();

  try {
    const currentState = parseStoredState(STORAGE_KEY, localStorage.getItem(STORAGE_KEY));
    if(currentState) state = mergeStates(state, currentState);

    let migratedLegacyState = false;
    LEGACY_KEYS.forEach(storageKey => {
      const legacyState = parseStoredState(storageKey, localStorage.getItem(storageKey));
      if(!legacyState) return;
      state = mergeStates(state, legacyState);
      migratedLegacyState = true;
    });

    if(migratedLegacyState) ss(state);
  } catch (error) {
    return state;
  }

  return state;
}
function ss(state){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function ensureMap(obj,key){ if(!obj[key] || typeof obj[key] !== 'object' || Array.isArray(obj[key])) obj[key] = {}; return obj[key]; }
function ensureList(obj,key){ if(!Array.isArray(obj[key])) obj[key] = []; return obj[key]; }
function getDateMap(container,date){
  for(const key of dayKeyCandidates(date)) {
    const value = container[key];
    if(value && typeof value === 'object' && !Array.isArray(value)) return value;
  }
  return {};
}
function getDateList(container,date){
  for(const key of dayKeyCandidates(date)) {
    const value = container[key];
    if(Array.isArray(value)) return value;
  }
  return [];
}
function hasDateData(state,date){
  return dayKeyCandidates(date).some(key => {
    const checks = state.checks[key];
    const added = state.added[key];
    const removed = state.removed[key];
    const stretchChecks = state.stretchChecks[key];
    const stretchRemoved = state.stretchRemoved[key];
    const addedStretches = state.addedStretches[key];

    return (checks && Object.keys(checks).length)
      || (Array.isArray(added) && added.length)
      || (Array.isArray(removed) && removed.length)
      || (stretchChecks && Object.keys(stretchChecks).length)
      || (Array.isArray(stretchRemoved) && stretchRemoved.length)
      || (Array.isArray(addedStretches) && addedStretches.length);
  });
}
function resolveWriteKey(container,date){
  const primary = dk(date);
  const legacy = legacyUtcDayKey(date);
  if(primary !== legacy && container[legacy] !== undefined && container[primary] === undefined) {
    container[primary] = container[legacy];
    delete container[legacy];
  }
  return primary;
}

function getVisibleExercises(date,state){
  const removed = new Set(getDateList(state.removed,date));
  const base = (ROUTINE[date.getDay()].exercises || [])
    .filter(ex => !removed.has(ex.id))
    .map(ex => ({ ...ex, instanceId: ex.id, builtIn: true }));
  const added = getDateList(state.added,date)
    .filter(ex => !removed.has(ex.instanceId))
    .map(ex => ({ ...ex, builtIn: false }));
  return [...base, ...added];
}
function getDayChecks(state,date){ return getDateMap(state.checks,date); }
function getVisibleStretches(date,state){
  const removed = new Set(getDateList(state.stretchRemoved,date));
  const added = new Set(getDateList(state.addedStretches,date));
  return STRETCH.filter(item => (DEFAULT_STRETCH_SET.has(item.id) || added.has(item.id)) && !removed.has(item.id));
}
function getStretchChecks(state,date){ return getDateMap(state.stretchChecks,date); }
function getStretchLibrary(date,state){
  const visibleIds = new Set(getVisibleStretches(date,state).map(item => item.id));
  return STRETCH.filter(item => !visibleIds.has(item.id));
}

function getExerciseLibrary(date,state){
  const currentDayIndex = date.getDay();
  const currentNames = new Set(getVisibleExercises(date,state).map(ex => `${ex.name}__${ex.sets}`));
  const library = [];

  WEEK_ORDER.forEach(dayIndex => {
    if(dayIndex === currentDayIndex) return;
    (ROUTINE[dayIndex].exercises || []).forEach(ex => {
      const key = `${ex.name}__${ex.sets}`;
      if(currentNames.has(key)) return;
      library.push({
        libraryId: `lib_${ex.id}_${dayIndex}`,
        sourceDay: ROUTINE[dayIndex].name,
        name: ex.name,
        sets: ex.sets,
        tag: ex.tag || '',
      });
    });
  });

  return library;
}

function toggleEx(dkey,instanceId){
  const state = ls();
  const date = fromDayKey(dkey);
  const writeKey = resolveWriteKey(state.checks,date);
  const checks = ensureMap(state.checks,writeKey);
  checks[instanceId] = !checks[instanceId];
  ss(state);
  render();
}
function removeExercise(instanceId){
  const state = ls();
  const dkey = resolveWriteKey(state.added,selDate);
  const visible = getVisibleExercises(selDate,state);
  const target = visible.find(item => item.instanceId === instanceId);
  if(!target) return;

  const added = ensureList(state.added,dkey);
  if(target.builtIn) {
    const removedKey = resolveWriteKey(state.removed,selDate);
    const removed = ensureList(state.removed,removedKey);
    if(!removed.includes(instanceId)) removed.push(instanceId);
  } else {
    const nextAdded = added.filter(item => item.instanceId !== instanceId);
    state.added[dkey] = nextAdded;
  }

  const checksKey = resolveWriteKey(state.checks,selDate);
  if(state.checks[checksKey]) delete state.checks[checksKey][instanceId];
  ss(state);
  render();
}
function removeStretch(stretchId){
  const state = ls();
  const dkey = resolveWriteKey(state.stretchRemoved,selDate);
  const removed = ensureList(state.stretchRemoved,dkey);
  if(!removed.includes(stretchId)) removed.push(stretchId);
  const checksKey = resolveWriteKey(state.stretchChecks,selDate);
  if(state.stretchChecks[checksKey]) delete state.stretchChecks[checksKey][stretchId];
  ss(state);
  render();
}
function toggleStretchComplete(stretchId){
  const state = ls();
  const dkey = resolveWriteKey(state.stretchChecks,selDate);
  const checks = ensureMap(state.stretchChecks,dkey);
  checks[stretchId] = !checks[stretchId];
  ss(state);
  render();
}
function addStretch(stretchId){
  const state = ls();
  const dkey = resolveWriteKey(state.addedStretches,selDate);
  if(!DEFAULT_STRETCH_SET.has(stretchId)) {
    const added = ensureList(state.addedStretches,dkey);
    if(!added.includes(stretchId)) added.push(stretchId);
  }

  const removedKey = resolveWriteKey(state.stretchRemoved,selDate);
  if(Array.isArray(state.stretchRemoved[removedKey])) {
    state.stretchRemoved[removedKey] = state.stretchRemoved[removedKey].filter(id => id !== stretchId);
  }

  addModalOpen = false;
  ss(state);
  render();
}
function addExercise(libraryId){
  const state = ls();
  const libraryItem = getExerciseLibrary(selDate,state).find(item => item.libraryId === libraryId);
  if(!libraryItem) return;

  const dkey = resolveWriteKey(state.added,selDate);
  const added = ensureList(state.added,dkey);
  added.push({
    instanceId: `added_${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
    name: libraryItem.name,
    sets: libraryItem.sets,
    tag: libraryItem.tag,
  });
  ss(state);
  addModalOpen = false;
  render();
}
function setDay(dateStr){ selDate = fromDayKey(dateStr); selDate.setHours(0,0,0,0); openStretchInfoId = null; render(); }
function setWeekOff(offset){
  weekOff = offset;
  const weekStart = ws(new Date(),offset);
  selDate = new Date(weekStart);
  selDate.setHours(0,0,0,0);
  openStretchInfoId = null;
  render();
}
function openAddModal(){ addModalOpen = true; render(); }
function closeAddModal(){ addModalOpen = false; render(); }
function toggleStretchInfo(id){ openStretchInfoId = openStretchInfoId === id ? null : id; render(); }
function setView(next){ view = next; if(next !== 'workout') addModalOpen = false; render(); }
function openTimer(stretchId) {
  const stretch = STRETCH.find(s => s.id === stretchId);
  if(!stretch) return;
  const secs = parseDuration(stretch.dur);
  if(!secs) return;
  timerStretchId = stretchId;
  timerSeconds = secs;
  timerActive = false;
  timerModalOpen = true;
  render();
}
function closeTimer() {
  if(timerInterval) clearInterval(timerInterval);
  timerActive = false;
  timerModalOpen = false;
  timerStretchId = null;
  timerSeconds = 0;
  render();
}
function startStopTimer() {
  timerActive = !timerActive;
  if(timerActive) {
    timerInterval = setInterval(() => {
      timerSeconds = Math.max(0, timerSeconds - 1);
      if(timerSeconds === 0) {
        timerActive = false;
        clearInterval(timerInterval);
      }
      render();
    }, 1000);
  } else {
    clearInterval(timerInterval);
  }
  render();
}

function resetWeek(){
  if(!confirm('Reset this week?')) return;
  const state = ls();
  const weekStart = ws(new Date(),0);
  for(let offset = 0; offset < 7; offset++) {
    const date = new Date(weekStart);
    date.setDate(weekStart.getDate()+offset);
    dayKeyCandidates(date).forEach(key => {
      delete state.checks[key];
      delete state.added[key];
      delete state.removed[key];
      delete state.stretchChecks[key];
      delete state.stretchRemoved[key];
      delete state.addedStretches[key];
    });
  }
  ss(state);
  render();
}

function renderStretchPane(state){
  const visibleStretches = getVisibleStretches(selDate,state);
  const stretchChecks = getStretchChecks(state,selDate);

  let html = `<div class="stretch-pane">
    <div class="stretch-head">
      <div>
        <div class="stretch-title">Stretch</div>
        <div class="stretch-sub"></div>
      </div>
    </div>
    <div class="stretch-grid">`;

  if(!visibleStretches.length) {
    html += `<div class="empty-day-note" style="grid-column:1/-1">No stretches left on this day.</div>`;
  }

  visibleStretches.forEach(item => {
    const isOpen = openStretchInfoId === item.id;
    const isDone = !!stretchChecks[item.id];
    const hasTimer = parseDuration(item.dur) !== null;
    html += `<div class="stretch-tile swipe-remove${isDone ? ' done' : ''}" data-kind="stretch" data-id="${item.id}">
      <div class="stretch-top">
        <div class="stretch-name${isDone ? ' done' : ''}">${esc(item.name)}</div>
        <div class="stretch-actions">
          <button class="stretch-check-btn${isDone ? ' done' : ''}" onclick="event.stopPropagation();toggleStretchComplete('${item.id}')" aria-label="Mark stretch complete">✓</button>
          ${hasTimer ? `<button class="stretch-timer-btn" onclick="event.stopPropagation();openTimer('${item.id}')" aria-label="Timer">⏱</button>` : ''}
          <button class="stretch-info-btn" onclick="event.stopPropagation();toggleStretchInfo('${item.id}')" aria-label="Stretch info">i</button>
        </div>
      </div>
      ${isOpen ? `<div class="stretch-tooltip">${esc(item.desc)}<div class="stretch-tooltip-meta">${esc(item.dur)} · ${esc(item.target)}</div></div>` : ''}
    </div>`;
  });

  html += `</div></div>`;
  return html;
}

function renderAddModal(state){
  const exerciseLibrary = getExerciseLibrary(selDate,state);
  const stretchLibrary = getStretchLibrary(selDate,state);
  let html = `<div class="modal${addModalOpen ? ' show' : ''}" onclick="closeAddModal()">
    <div class="modal-sheet" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <div class="modal-head">
        <div>
          <div class="modal-title">Add to day</div>
          <div class="modal-sub">Add optional items only to ${ROUTINE[selDate.getDay()].name} (${MS[selDate.getMonth()]} ${selDate.getDate()}).</div>
        </div>
        <button class="modal-close" onclick="closeAddModal()" aria-label="Close">x</button>
      </div>`;

  if(!exerciseLibrary.length && !stretchLibrary.length) {
    html += `<div class="empty-picker">No optional items available to add.</div>`;
  }

  if(exerciseLibrary.length) {
    html += `<div class="section-label" style="padding:0 2px 8px">Exercises</div>`;
    html += `<div class="picker-list">`;
    exerciseLibrary.forEach(item => {
      html += `<div class="picker-card">
        <div class="picker-top">
          <div>
            <div class="picker-name">${esc(item.name)}</div>
            <div class="picker-meta">${esc(item.sets)}${item.tag === 'posture' ? ' · posture' : ''}</div>
          </div>
          <div class="picker-day">${esc(item.sourceDay)}</div>
        </div>
        <button class="picker-add" onclick="addExercise('${item.libraryId}')">Add to this day</button>
      </div>`;
    });
    html += `</div>`;
  }

  if(stretchLibrary.length) {
    html += `<div class="section-label" style="padding:12px 2px 8px">Stretches</div>`;
    html += `<div class="picker-list">`;
    stretchLibrary.forEach(item => {
      html += `<div class="picker-card">
        <div class="picker-top">
          <div>
            <div class="picker-name">${esc(item.name)}</div>
            <div class="picker-meta">${esc(item.dur)} · ${esc(item.target)}</div>
          </div>
        </div>
        <button class="picker-add" onclick="addStretch('${item.id}')">Add stretch to this day</button>
      </div>`;
    });
    html += `</div>`;
  }

  html += `</div></div>`;
  return html;
}

function renderWorkoutView(state,today){
  const day = ROUTINE[selDate.getDay()];
  const dkey = dk(selDate);
  const visibleExercises = getVisibleExercises(selDate,state);
  const checks = getDayChecks(state,selDate);
  const isFuture = selDate > today;
  const doneCount = visibleExercises.filter(ex => checks[ex.instanceId]).length;
  const pct = visibleExercises.length ? Math.round(doneCount / visibleExercises.length * 100) : 0;

  let html = `<header>
    <div class="header-row">
      <div class="header-copy">
        <div class="day-title${day.rest && visibleExercises.length === 0 ? ' rest' : ''}">${day.name}</div>
        <div class="date-sub">${MS[selDate.getMonth()]} ${selDate.getDate()}${dkey === dk(today) ? ' · Today' : ''}</div>
      </div>
      <div class="header-actions">
        ${visibleExercises.length ? `<div class="progress-pill">${doneCount}/${visibleExercises.length}</div>` : ''}
        <button class="add-btn" onclick="openAddModal()" aria-label="Add exercise">+</button>
      </div>
    </div>
    <div class="prog-bar-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
  </header>`;

  html += `<div class="day-layout"><div class="exercise-pane"><div class="section-label">Exercises</div><div class="exercise-list">`;

  if(day.rest && visibleExercises.length === 0) {
    html += `<div class="rest-screen"><div class="rest-title">Rest day</div><div class="rest-sub">Recovery still counts. Keep stretch in the bottom block and add an exercise only if you actually did it.</div></div>`;
  } else if(visibleExercises.length === 0) {
    html += `<div class="empty-day-note">Nothing scheduled on this date right now.<br>Use + to add from the rest of your week.</div>`;
  } else {
    visibleExercises.forEach(ex => {
      const done = !!checks[ex.instanceId];
      const clickAttr = isFuture ? '' : `onclick="toggleEx('${dkey}','${ex.instanceId}')"`;
      html += `<div class="ex-item swipe-remove${done ? ' done' : ''}${isFuture ? ' readonly' : ''}" data-kind="exercise" data-id="${ex.instanceId}" ${clickAttr}>
        <div class="check-circle"><div class="checkmark"></div></div>
        <div class="ex-main">
          <div class="ex-name">${esc(ex.name)}</div>
          <div class="ex-meta">
            <span>${esc(ex.sets)}</span>
            ${ex.tag === 'posture' ? '<span class="meta-chip posture">posture</span>' : ''}
            ${!ex.builtIn ? '<span class="meta-chip added">added</span>' : ''}
          </div>
        </div>
      </div>`;
    });
    if(doneCount === visibleExercises.length) html += `<div class="complete-banner">Session complete</div>`;
  }

  html += `</div></div>${renderStretchPane(state)}</div>`;
  html += renderAddModal(state);
  return html;
}

function renderHistory(state,today){
  let html = `<div class="history-screen">`;
  let hasAny = false;

  for(let week = 0; week >= -3; week--) {
    const weekStart = ws(today,week);
    const days = [];
    for(let offset = 0; offset < 7; offset++) {
      const date = new Date(weekStart);
      date.setDate(weekStart.getDate()+offset);
      if(date <= today) days.push(date);
    }

    const weekHasData = days.some(date => hasDateData(state,date));
    if(!weekHasData && week < 0) continue;

    hasAny = true;
    const label = week === 0 ? 'This week' : week === -1 ? 'Last week' : `${Math.abs(week)} weeks ago`;
    html += `<div class="week-block"><div class="wk-lbl">${label}</div>`;

    days.forEach(date => {
      const routineDay = ROUTINE[date.getDay()];
      const exercises = getVisibleExercises(date,state);
      const checks = getDayChecks(state,date);
      const doneCount = exercises.filter(ex => checks[ex.instanceId]).length;
      let badgeClass = 'badge-skipped';
      let badgeText = 'Skipped';

      if(routineDay.rest && exercises.length === 0) {
        badgeClass = 'badge-rest';
        badgeText = 'Rest';
      } else if(exercises.length === 0) {
        badgeClass = 'badge-empty';
        badgeText = 'Empty';
      } else if(doneCount === exercises.length) {
        badgeClass = 'badge-full';
        badgeText = 'Complete';
      } else if(doneCount > 0) {
        badgeClass = 'badge-partial';
        badgeText = `${doneCount}/${exercises.length} done`;
      }

      html += `<div class="history-day">
        <div class="history-day-head">
          <div class="history-day-name">${routineDay.name} <span style="font-weight:400;color:var(--muted);font-size:11px">${MS[date.getMonth()]} ${date.getDate()}</span></div>
          <div class="hbadge ${badgeClass}">${badgeText}</div>
        </div>`;

      if(exercises.length) {
        html += `<div class="history-exes">${exercises.map(ex => `<div class="history-ex${checks[ex.instanceId] ? ' done' : ''}">${esc(ex.name)}</div>`).join('')}</div>`;
      }

      html += `</div>`;
    });

    html += `</div>`;
  }

  if(!hasAny) html += `<div class="empty-history">No history yet.<br>Complete your first session<br>to see it here.</div>`;
  html += `</div><button class="reset-btn" onclick="resetWeek()">Reset this week</button>`;
  return html;
}

function attachSwipeHandlers(){
  const items = document.querySelectorAll('.swipe-remove');
  items.forEach(item => {
    let startX = 0;
    let deltaX = 0;
    let activePointer = null;
    let swiped = false;

    item.addEventListener('pointerdown', event => {
      if(event.button !== 0) return;
      if(event.target.closest('button')) return;
      activePointer = event.pointerId;
      startX = event.clientX;
      deltaX = 0;
      swiped = false;
      item.style.transition = 'none';
      item.setPointerCapture(activePointer);
    });

    item.addEventListener('pointermove', event => {
      if(activePointer !== event.pointerId) return;
      const raw = event.clientX - startX;
      deltaX = Math.min(0, Math.max(raw, -100));
      if(Math.abs(deltaX) > 8) swiped = true;
      if(deltaX < 0) item.style.transform = `translateX(${deltaX}px)`;
    });

    const endSwipe = event => {
      if(activePointer !== event.pointerId) return;
      item.releasePointerCapture(activePointer);
      activePointer = null;
      item.style.transition = 'transform 0.18s ease';

      if(deltaX <= -60) {
        const kind = item.dataset.kind;
        const id = item.dataset.id;
        if(kind === 'exercise') removeExercise(id);
        if(kind === 'stretch') removeStretch(id);
        return;
      }

      item.style.transform = '';
      deltaX = 0;
    };

    item.addEventListener('pointerup', endSwipe);
    item.addEventListener('pointercancel', endSwipe);
    item.addEventListener('click', event => {
      if(!swiped) return;
      event.preventDefault();
      event.stopPropagation();
      swiped = false;
    }, true);
  });
}

function render(){
  const app = document.getElementById('app');
  const today = new Date();
  today.setHours(0,0,0,0);
  const state = ls();
  const dkey = dk(selDate);
  const weekStart = ws(today,weekOff);
  const weekLabel = weekOff === 0 ? 'This week' : weekOff === -1 ? 'Last week' : weekOff < 0 ? `${Math.abs(weekOff)} weeks ago` : 'Next week';

  let html = `<div class="week-strip">
    <div class="week-nav">
      <div class="week-arrow" onclick="setWeekOff(${weekOff-1})">‹</div>
      <div class="week-label-text">${weekLabel}</div>
      <div class="week-arrow" onclick="setWeekOff(${weekOff+1})">›</div>
    </div>
    <div class="days-row">`;

  for(let index = 0; index < 7; index++) {
    const date = new Date(weekStart);
    date.setDate(weekStart.getDate()+index);
    const dayKey = dk(date);
    const exercises = getVisibleExercises(date,state);
    const checks = getDayChecks(state,date);
    const isSelected = dayKey === dkey;
    const isToday = dayKey === dk(today);
    const allDone = exercises.length > 0 && exercises.every(ex => checks[ex.instanceId]);

    html += `<div class="day-pill${isSelected ? ' active' : ''}${isToday ? ' is-today' : ''}${exercises.length ? ' has-workout' : ''}${allDone ? ' all-done' : ''}" onclick="setDay('${dayKey}')">
      <div class="dp-name">${DS[date.getDay()]}</div>
      <div class="dp-num">${date.getDate()}</div>
      <div class="dp-dot"></div>
    </div>`;
  }

  html += `</div></div>`;
  
  // Timer modal
  if(timerModalOpen && timerStretchId) {
    const stretch = STRETCH.find(s => s.id === timerStretchId);
    html += `<div class="timer-modal show" onclick="closeTimer()">
      <div class="timer-card" onclick="event.stopPropagation()">
        <div class="timer-name">${stretch ? esc(stretch.name) : 'Timer'}</div>
        <div class="timer-display">${formatSeconds(timerSeconds)}</div>
        <div class="timer-controls">
          <button class="timer-btn primary" onclick="startStopTimer()">${timerActive ? 'Pause' : 'Start'}</button>
          <button class="timer-btn cancel" onclick="closeTimer()">Done</button>
        </div>
      </div>
    </div>`;
  }
  
  html += view === 'workout' ? renderWorkoutView(state,today) : renderHistory(state,today);
  html += `<div class="bottom-nav">
    <div class="nav-btn${view === 'workout' ? ' active' : ''}" onclick="setView('workout')">Workout</div>
    <div class="nav-btn${view === 'history' ? ' active' : ''}" onclick="setView('history')">History</div>
  </div>`;
  app.innerHTML = html;
  if(view === 'workout') attachSwipeHandlers();
}

render();
</script>
</body>
</html>
