<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym">
<meta name="theme-color" content="#0e0e0e">
<title>Gym</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --accent: #c8f060;
    --accent-dim: #c8f06022;
    --text: #f0f0e8;
    --muted: #666;
    --done-bg: #1a2a0a;
    --done-border: #3a5a1a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overscroll-behavior: none;
  }

  .app { max-width: 430px; margin: 0 auto; padding: env(safe-area-inset-top, 44px) 0 env(safe-area-inset-bottom, 34px); min-height: 100vh; display: flex; flex-direction: column; }

  header {
    padding: 16px 24px 12px;
    border-bottom: 0.5px solid var(--border);
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .day-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
  }

  .nav-arrow {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: var(--muted);
    cursor: pointer;
    border-radius: 50%;
    transition: all 0.2s;
  }

  .nav-arrow:active { background: var(--surface); }

  .day-name {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
    text-align: center;
    flex: 1;
  }

  .day-name.rest { color: var(--muted); }

  .date-str {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-top: 2px;
  }
