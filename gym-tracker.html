<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym">
<meta name="theme-color" content="#0e0e0e">
<title>Gym</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --accent: #c8f060;
    --accent-dim: #c8f06022;
    --text: #f0f0e8;
    --muted: #666;
    --done-bg: #1a2a0a;
    --done-border: #3a5a1a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overscroll-behavior: none;
  }

  .app { max-width: 430px; margin: 0 auto; padding: env(safe-area-inset-top, 44px) 0 env(safe-area-inset-bottom, 34px); min-height: 100vh; display: flex; flex-direction: column; }

  header {
    padding: 20px 24px 16px;
    border-bottom: 0.5px solid var(--border);
  }

  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }

  .day-name {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .day-name.rest { color: var(--muted); }

  .date-str {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  .progress-pill {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.02em;
  }

  .progress-bar-wrap {
    margin-top: 12px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .exercises { flex: 1; padding: 16px 16px 0; display: flex; flex-direction: column; gap: 8px; }

  .ex-item {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
    -webkit-user-select: none;
    active: scale(0.97);
  }

  .ex-item:active { transform: scale(0.98); opacity: 0.85; }

  .ex-item.done {
    background: var(--done-bg);
    border-color: var(--done-border);
  }

  .check-circle {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s ease;
  }

  .ex-item.done .check-circle {
    background: var(--accent);
    border-color: var(--accent);
  }

  .checkmark {
    width: 10px;
    height: 7px;
    border-left: 2px solid #0e0e0e;
    border-bottom: 2px solid #0e0e0e;
    transform: rotate(-45deg) translateY(-1px);
    opacity: 0;
    transition: opacity 0.15s ease;
  }

  .ex-item.done .checkmark { opacity: 1; }

  .ex-info { flex: 1; }

  .ex-name {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -0.2px;
    color: var(--text);
    transition: color 0.2s;
  }

  .ex-item.done .ex-name { color: var(--muted); text-decoration: line-through; }

  .ex-sets {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .ex-item.done .ex-sets { color: #444; }

  .ex-tag {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: 500;
    background: #c8f06015;
    color: #8ab040;
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }

  .rest-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }

  .rest-icon { font-size: 56px; margin-bottom: 16px; }

  .rest-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: var(--muted); }

  .rest-sub { font-size: 14px; color: #444; line-height: 1.6; }

  .bottom-nav {
    display: flex;
    padding: 12px 16px;
    border-top: 0.5px solid var(--border);
    gap: 8px;
    margin-top: 16px;
  }

  .nav-btn {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }

  .nav-btn:active { opacity: 0.7; transform: scale(0.97); }
  .nav-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .history-screen { flex: 1; padding: 16px; overflow-y: auto; }

  .week-block { margin-bottom: 24px; }

  .week-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding: 0 4px;
  }

  .history-day {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 6px;
  }

  .history-day-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .history-day-name { font-size: 14px; font-weight: 600; }

  .history-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: 500;
  }

  .badge-full { background: #1a2a0a; color: var(--accent); }
  .badge-partial { background: #2a1a0a; color: #f0a060; }
  .badge-skipped { background: #2a0a0a; color: #f06060; }
  .badge-rest { background: var(--border); color: var(--muted); }

  .history-exes {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .history-ex {
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 5px;
    background: var(--bg);
    color: var(--muted);
    border: 0.5px solid var(--border);
  }

  .history-ex.done { background: var(--done-bg); color: #8ab040; border-color: var(--done-border); }

  .empty-history { text-align: center; padding: 60px 24px; color: var(--muted); font-size: 14px; line-height: 1.6; }

  .reset-btn {
    margin: 0 16px 8px;
    padding: 12px;
    border-radius: 12px;
    border: 0.5px solid #3a1a1a;
    background: #1a0a0a;
    color: #f06060;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    width: calc(100% - 32px);
    transition: opacity 0.15s;
  }

  .reset-btn:active { opacity: 0.6; }

  .complete-banner {
    margin: 0 16px;
    padding: 14px 18px;
    background: var(--done-bg);
    border: 0.5px solid var(--done-border);
    border-radius: 12px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const ROUTINE = {
  1: { // Monday
    name: 'Monday',
    exercises: [
      { id: 'mon1', name: 'Bench flat', sets: '4 sets', tag: '' },
      { id: 'mon2', name: 'Pull up', sets: '4 sets', tag: '' },
      { id: 'mon3', name: 'Cable Y-raise', sets: '4 sets', tag: 'posture' },
      { id: 'mon4', name: 'Tricep', sets: '4 sets', tag: '' },
    ]
  },
  2: { // Tuesday
    name: 'Tuesday',
    rest: true
  },
  3: { // Wednesday
    name: 'Wednesday',
    exercises: [
      { id: 'wed1', name: 'Chest fly', sets: '4 sets', tag: '' },
      { id: 'wed2', name: 'Lat raise', sets: '4 sets', tag: '' },
      { id: 'wed3', name: 'Leg press / squat', sets: '4 sets', tag: '' },
      { id: 'wed4', name: 'Romanian deadlift', sets: '4 sets', tag: 'posture' },
    ]
  },
  4: { // Thursday
    name: 'Thursday',
    rest: true
  },
  5: { // Friday
    name: 'Friday',
    exercises: [
      { id: 'fri1', name: 'Bench flat', sets: '4 sets', tag: '' },
      { id: 'fri2', name: 'Pull up', sets: '4 sets', tag: '' },
      { id: 'fri3', name: 'Shoulder press', sets: '3 sets', tag: '' },
      { id: 'fri4', name: 'Hip thrust', sets: '4 sets', tag: 'posture' },
      { id: 'fri5', name: 'Tricep', sets: '3 sets', tag: '' },
    ]
  },
  6: { // Saturday
    name: 'Saturday',
    exercises: [
      { id: 'sat1', name: 'Dead hang', sets: 'decompression', tag: 'posture' },
      { id: 'sat2', name: 'DB deadlift', sets: '4 sets', tag: '' },
      { id: 'sat3', name: 'Zone 2 cardio', sets: '40 min', tag: '' },
      { id: 'sat4', name: 'Hanging leg raise', sets: '4 sets · pelvic tuck', tag: 'posture' },
    ]
  },
  0: { // Sunday
    name: 'Sunday',
    exercises: [
      { id: 'sun1', name: 'Lat raise + uprise', sets: '4 sets', tag: '' },
      { id: 'sun2', name: 'Bent over row', sets: '4 sets', tag: '' },
      { id: 'sun3', name: 'Bicep', sets: '6+ sets', tag: '' },
      { id: 'sun4', name: 'Calf raise', sets: '4 sets', tag: '' },
    ]
  }
};

const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function getWeekKey(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay());
  return d.toISOString().split('T')[0];
}

function getTodayKey() {
  return new Date().toISOString().split('T')[0];
}

function loadState() {
  try {
    return JSON.parse(localStorage.getItem('gymState') || '{}');
  } catch(e) { return {}; }
}

function saveState(state) {
  localStorage.setItem('gymState', JSON.stringify(state));
}

function toggleExercise(dateKey, exId) {
  const state = loadState();
  if (!state[dateKey]) state[dateKey] = {};
  state[dateKey][exId] = !state[dateKey][exId];
  saveState(state);
  render();
}

let currentView = 'today';

function render() {
  const app = document.getElementById('app');
  const now = new Date();
  const dow = now.getDay();
  const todayKey = getTodayKey();
  const state = loadState();
  const todayState = state[todayKey] || {};
  const day = ROUTINE[dow];

  const dateStr = `${DAYS[dow]}, ${MONTHS[now.getMonth()]} ${now.getDate()}`;

  let content = '';

  // Header
  if (currentView === 'today' || currentView === 'history') {
    const isRest = day.rest;
    const exes = day.exercises || [];
    const doneCount = exes.filter(e => todayState[e.id]).length;
    const pct = exes.length ? Math.round((doneCount / exes.length) * 100) : 0;

    content += `<header>
      <div class="header-top">
        <div>
          <div class="day-name${isRest ? ' rest' : ''}">${day.name}</div>
          <div class="date-str">${dateStr}</div>
        </div>
        ${!isRest ? `<div class="progress-pill">${doneCount}/${exes.length}</div>` : ''}
      </div>
      ${!isRest ? `<div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>` : ''}
    </header>`;
  }

  if (currentView === 'today') {
    if (day.rest) {
      content += `<div class="rest-screen">
        <div class="rest-icon">🛋️</div>
        <div class="rest-title">Rest day</div>
        <div class="rest-sub">Recovery is part of the programme.<br>Check your stretch routine tonight.</div>
      </div>`;
    } else {
      const exes = day.exercises;
      const doneCount = exes.filter(e => todayState[e.id]).length;
      const allDone = doneCount === exes.length;

      content += `<div class="exercises">`;
      exes.forEach(ex => {
        const done = !!todayState[ex.id];
        content += `<div class="ex-item${done ? ' done' : ''}" onclick="toggleExercise('${todayKey}','${ex.id}')">
          <div class="check-circle"><div class="checkmark"></div></div>
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-sets">${ex.sets}</div>
          </div>
          ${ex.tag === 'posture' ? `<div class="ex-tag">posture</div>` : ''}
        </div>`;
      });
      content += `</div>`;

      if (allDone) {
        content += `<div class="complete-banner" style="margin-top:12px">Session complete 🎯</div>`;
      }
    }
  }

  if (currentView === 'history') {
    content += `<div class="history-screen">`;

    // Build last 4 weeks
    const weeks = [];
    for (let w = 0; w < 4; w++) {
      const d = new Date();
      d.setDate(d.getDate() - (w * 7));
      const wk = getWeekKey(d);
      weeks.push(wk);
    }

    const hasAny = weeks.some(wk => {
      for (let d = 0; d < 7; d++) {
        const dd = new Date(wk);
        dd.setDate(dd.getDate() + d);
        const dk = dd.toISOString().split('T')[0];
        if (state[dk]) return true;
      }
      return false;
    });

    if (!hasAny) {
      content += `<div class="empty-history">No history yet.<br>Complete your first session<br>to see it here.</div>`;
    } else {
      weeks.forEach((wk, wi) => {
        const weekDays = [];
        for (let d = 0; d < 7; d++) {
          const dd = new Date(wk);
          dd.setDate(dd.getDate() + d);
          weekDays.push(dd);
        }

        const hasData = weekDays.some(dd => state[dd.toISOString().split('T')[0]]);
        if (!hasData && wi > 0) return;

        const label = wi === 0 ? 'This week' : wi === 1 ? 'Last week' : `${wi} weeks ago`;
        content += `<div class="week-block"><div class="week-label">${label}</div>`;

        weekDays.forEach(dd => {
          const dow2 = dd.getDay();
          const dk = dd.toISOString().split('T')[0];
          const dayData = ROUTINE[dow2];
          const isFuture = dd > now;
          if (isFuture) return;

          if (dayData.rest) {
            content += `<div class="history-day">
              <div class="history-day-head">
                <div class="history-day-name">${dayData.name}</div>
                <div class="history-badge badge-rest">Rest</div>
              </div>
            </div>`;
            return;
          }

          const exes = dayData.exercises;
          const ds = state[dk] || {};
          const doneCount = exes.filter(e => ds[e.id]).length;
          const total = exes.length;

          let badgeClass = 'badge-skipped';
          let badgeText = 'Skipped';
          if (doneCount === total) { badgeClass = 'badge-full'; badgeText = 'Complete'; }
          else if (doneCount > 0) { badgeClass = 'badge-partial'; badgeText = `${doneCount}/${total} done`; }

          content += `<div class="history-day">
            <div class="history-day-head">
              <div class="history-day-name">${dayData.name} <span style="font-weight:400;color:var(--muted);font-size:12px">${MONTHS[dd.getMonth()]} ${dd.getDate()}</span></div>
              <div class="history-badge ${badgeClass}">${badgeText}</div>
            </div>
            <div class="history-exes">
              ${exes.map(e => `<div class="history-ex${ds[e.id] ? ' done' : ''}">${e.name}</div>`).join('')}
            </div>
          </div>`;
        });

        content += `</div>`;
      });
    }

    content += `</div>`;
    content += `<button class="reset-btn" onclick="resetWeek()">Reset this week</button>`;
  }

  // Bottom nav
  content += `<div class="bottom-nav">
    <div class="nav-btn${currentView === 'today' ? ' active' : ''}" onclick="setView('today')">Today</div>
    <div class="nav-btn${currentView === 'history' ? ' active' : ''}" onclick="setView('history')">History</div>
  </div>`;

  app.innerHTML = content;
}

function setView(v) {
  currentView = v;
  render();
}

function resetWeek() {
  if (!confirm('Reset all data for this week?')) return;
  const state = loadState();
  const wk = getWeekKey(new Date());
  for (let d = 0; d < 7; d++) {
    const dd = new Date(wk);
    dd.setDate(dd.getDate() + d);
    const dk = dd.toISOString().split('T')[0];
    delete state[dk];
  }
  saveState(state);
  render();
}

render();
</script>
</body>
</html>
