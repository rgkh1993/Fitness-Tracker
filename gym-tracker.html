<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym">
<meta name="theme-color" content="#0e0e0e">
<title>Gym</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --accent: #c8f060;
    --accent-dim: #c8f06022;
    --text: #f0f0e8;
    --muted: #666;
    --done-bg: #1a2a0a;
    --done-border: #3a5a1a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overscroll-behavior: none;
  }

  .app { max-width: 430px; margin: 0 auto; padding: env(safe-area-inset-top, 44px) 0 env(safe-area-inset-bottom, 34px); min-height: 100vh; display: flex; flex-direction: column; }

  header {
    padding: 20px 24px 16px;
    border-bottom: 0.5px solid var(--border);
  }

  .header-top { 
    display: flex; 
    justify-content: space-between; 
    align-items: flex-start; 
    margin-bottom: 4px; 
  }

  .day-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
  }

  .nav-arrow {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: var(--muted);
    cursor: pointer;
    border-radius: 50%;
    transition: all 0.2s;
  }

  .nav-arrow:active { background: var(--surface); }

  .day-name {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
    text-align: center;
  }

  .day-name.rest { color: var(--muted); }

  .date-str {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  .progress-pill {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.02em;
  }

  .progress-bar-wrap {
    margin-top: 12px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .exercises { 
    flex: 1; 
    padding: 16px 16px 0; 
    display: flex; 
    flex-direction: column; 
    gap: 8px; 
  }

  .ex-item {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
  }

  .ex-item:active { transform: scale(0.98); opacity: 0.85; }

  .ex-item.done {
    background: var(--done-bg);
    border-color: var(--done-border);
  }

  .check-circle {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .ex-item.done .check-circle {
    background: var(--accent);
    border-color: var(--accent);
  }

  .checkmark {
    width: 10px;
    height: 7px;
    border-left: 2px solid #0e0e0e;
    border-bottom: 2px solid #0e0e0e;
    transform: rotate(-45deg) translateY(-1px);
    opacity: 0;
  }

  .ex-item.done .checkmark { opacity: 1; }

  .ex-info { flex: 1; }

  .ex-name {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -0.2px;
  }

  .ex-item.done .ex-name { color: var(--muted); text-decoration: line-through; }

  .ex-sets {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .ex-tag {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: 500;
    background: #c8f06015;
    color: #8ab040;
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }

  .ex-actions {
    display: flex;
    gap: 6px;
  }

  .action-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: var(--muted);
    background: var(--surface);
    cursor: pointer;
  }

  .action-btn.remove { color: #f06060; border-color: #3a1a1a; }

  .add-ex-btn {
    margin: 12px 16px 20px;
    padding: 14px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    cursor: pointer;
    transition: all 0.2s;
  }

  .add-ex-btn:active { opacity: 0.85; transform: scale(0.98); }

  /* Modal */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: flex-end;
    z-index: 100;
  }

  .modal-content {
    background: var(--surface);
    width: 100%;
    max-width: 430px;
    margin: 0 auto;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    max-height: 75vh;
    overflow-y: auto;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 0.5px solid var(--border);
  }

  .modal-title { font-size: 18px; font-weight: 600; }

  .exercise-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .exercise-option {
    padding: 14px 16px;
    background: var(--bg);
    border-radius: 12px;
    cursor: pointer;
    font-size: 15px;
  }

  .exercise-option:active { background: var(--accent-dim); }

  .rest-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }

  .rest-icon { font-size: 56px; margin-bottom: 16px; }

  .rest-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: var(--muted); }

  .rest-sub { font-size: 14px; color: #444; line-height: 1.6; }

  .bottom-nav {
    display: flex;
    padding: 12px 16px;
    border-top: 0.5px solid var(--border);
    gap: 8px;
    margin-top: 16px;
  }

  .nav-btn {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
  }

  .nav-btn:active { opacity: 0.7; transform: scale(0.97); }
  .nav-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div class="app" id="app"></div>

<!-- Add Exercise Modal -->
<div class="modal" id="addModal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title">Add Exercise</div>
      <div onclick="closeModal()" style="font-size:24px;cursor:pointer;color:var(--muted);">×</div>
    </div>
    <div class="exercise-list" id="exerciseList"></div>
  </div>
</div>

<script>
// ================== BASE ROUTINE (unchanged) ==================
const BASE_ROUTINE = {
  0: { name: 'Sunday', exercises: [
    { id: 'sun1', name: 'Lat raise + uprise', sets: '4 sets' },
    { id: 'sun2', name: 'Bent over row', sets: '4 sets' },
    { id: 'sun3', name: 'Bicep', sets: '6+ sets' },
    { id: 'sun4', name: 'Calf raise', sets: '4 sets' },
  ]},
  1: { name: 'Monday', exercises: [
    { id: 'mon1', name: 'Bench flat', sets: '4 sets' },
    { id: 'mon2', name: 'Pull up', sets: '4 sets' },
    { id: 'mon3', name: 'Cable Y-raise', sets: '4 sets', tag: 'posture' },
    { id: 'mon4', name: 'Tricep', sets: '4 sets' },
  ]},
  2: { name: 'Tuesday', rest: true },
  3: { name: 'Wednesday', exercises: [
    { id: 'wed1', name: 'Chest fly', sets: '4 sets' },
    { id: 'wed2', name: 'Lat raise', sets: '4 sets' },
    { id: 'wed3', name: 'Leg press / squat', sets: '4 sets' },
    { id: 'wed4', name: 'Romanian deadlift', sets: '4 sets', tag: 'posture' },
  ]},
  4: { name: 'Thursday', rest: true },
  5: { name: 'Friday', exercises: [
    { id: 'fri1', name: 'Bench flat', sets: '4 sets' },
    { id: 'fri2', name: 'Pull up', sets: '4 sets' },
    { id: 'fri3', name: 'Shoulder press', sets: '3 sets' },
    { id: 'fri4', name: 'Hip thrust', sets: '4 sets', tag: 'posture' },
    { id: 'fri5', name: 'Tricep', sets: '3 sets' },
  ]},
  6: { name: 'Saturday', exercises: [
    { id: 'sat1', name: 'Dead hang', sets: 'decompression', tag: 'posture' },
    { id: 'sat2', name: 'DB deadlift', sets: '4 sets' },
    { id: 'sat3', name: 'Zone 2 cardio', sets: '40 min' },
    { id: 'sat4', name: 'Hanging leg raise', sets: '4 sets · pelvic tuck', tag: 'posture' },
  ]},
};

const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function getDateKey(date) {
  return date.toISOString().split('T')[0];
}

function loadState() {
  try { return JSON.parse(localStorage.getItem('gymState') || '{}'); } 
  catch(e) { return {}; }
}

function saveState(state) {
  localStorage.setItem('gymState', JSON.stringify(state));
}

let currentDate = new Date();

// ================== HELPERS ==================
function getWeekExercises() {
  const state = loadState();
  const weekStart = new Date(currentDate);
  weekStart.setDate(weekStart.getDate() - weekStart.getDay());

  const weekExs = new Map();

  // Base routine exercises this week
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    const base = BASE_ROUTINE[d.getDay()];
    if (base && base.exercises) {
      base.exercises.forEach(ex => {
        if (!weekExs.has(ex.name)) {
          weekExs.set(ex.name, {name: ex.name, sets: ex.sets, tag: ex.tag || ''});
        }
      });
    }
  }

  // Custom exercises added this week
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    const dk = getDateKey(d);
    if (state[dk] && state[dk].exercises) {
      state[dk].exercises.forEach(ex => {
        if (!weekExs.has(ex.name)) {
          weekExs.set(ex.name, {name: ex.name, sets: ex.sets, tag: ex.tag || ''});
        }
      });
    }
  }

  return Array.from(weekExs.values());
}

function toggleExercise(dateKey, exId) {
  const state = loadState();
  if (!state[dateKey]) state[dateKey] = {exercises: [], completed: {}};
  if (!state[dateKey].completed) state[dateKey].completed = {};
  
  state[dateKey].completed[exId] = !state[dateKey].completed[exId];
  saveState(state);
  render();
}

function addExerciseToDay(exName, sets, tag = '') {
  const dateKey = getDateKey(currentDate);
  const state = loadState();
  
  if (!state[dateKey]) state[dateKey] = {exercises: [], completed: {}};
  
  const newId = 'custom_' + Date.now();
  state[dateKey].exercises = state[dateKey].exercises || [];
  state[dateKey].exercises.push({ id: newId, name: exName, sets: sets, tag: tag });
  
  saveState(state);
  closeModal();
  render();
}

function removeExerciseFromDay(exId) {
  if (!confirm('Remove this exercise from today?')) return;
  
  const dateKey = getDateKey(currentDate);
  const state = loadState();
  
  if (state[dateKey] && state[dateKey].exercises) {
    state[dateKey].exercises = state[dateKey].exercises.filter(e => e.id !== exId);
    if (state[dateKey].completed) delete state[dateKey].completed[exId];
  }
  
  saveState(state);
  render();
}

// ================== RENDER ==================
function render() {
  const app = document.getElementById('app');
  const dateKey = getDateKey(currentDate);
  const state = loadState();
  const dayState = state[dateKey] || {exercises: [], completed: {}};
  
  const dow = currentDate.getDay();
  const baseDay = BASE_ROUTINE[dow];
  const isRest = !!(baseDay && baseDay.rest);

  let exercises = [];
  if (!isRest && baseDay && baseDay.exercises) exercises = [...baseDay.exercises];
  if (dayState.exercises) exercises = [...exercises, ...dayState.exercises];

  const doneCount = exercises.filter(e => dayState.completed?.[e.id]).length;
  const pct = exercises.length ? Math.round((doneCount / exercises.length) * 100) : 0;

  const dateStr = `${DAYS[dow]}, ${MONTHS[currentDate.getMonth()]} ${currentDate.getDate()}`;
  const isToday = dateKey === getDateKey(new Date());

  let content = '';

  // Header (back to original style)
  content += `
    <header>
      <div class="header-top">
        <div class="day-nav">
          <div class="nav-arrow" onclick="prevDay()">‹</div>
          <div class="day-name${isRest ? ' rest' : ''}">${baseDay ? baseDay.name : DAYS[dow]}</div>
          <div class="nav-arrow" onclick="nextDay()">›</div>
        </div>
      </div>
      <div class="date-str">${dateStr} ${isToday ? '· Today' : ''}</div>
      ${!isRest || exercises.length > 0 ? `
        <div class="progress-pill">${doneCount}/${exercises.length}</div>
        <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
      ` : ''}
    </header>`;

  // Main content
  if (isRest && exercises.length === 0) {
    content += `
      <div class="rest-screen">
        <div class="rest-icon">🛋️</div>
        <div class="rest-title">Rest day</div>
        <div class="rest-sub">Recovery is part of the programme.<br>Check your stretch routine tonight.</div>
      </div>`;
  } else {
    content += `<div class="exercises">`;
    
    exercises.forEach(ex => {
      const done = !!dayState.completed?.[ex.id];
      const isCustom = ex.id && ex.id.startsWith('custom_');
      
      content += `
        <div class="ex-item${done ? ' done' : ''}" onclick="toggleExercise('${dateKey}','${ex.id}')">
          <div class="check-circle"><div class="checkmark"></div></div>
          <div class="ex-info">
            <div class="ex-name">${ex.name}</div>
            <div class="ex-sets">${ex.sets}</div>
          </div>
          ${ex.tag === 'posture' ? `<div class="ex-tag">posture</div>` : ''}
          <div class="ex-actions">
            ${isCustom ? `<div class="action-btn remove" onclick="event.stopImmediatePropagation(); removeExerciseFromDay('${ex.id}')">–</div>` : ''}
          </div>
        </div>`;
    });

    content += `</div>`;
  }

  // Normal sized + button below header / content
  content += `
    <div class="add-ex-btn" onclick="showAddModal()">
      + Add Exercise
    </div>`;

  // Bottom nav
  content += `
    <div class="bottom-nav">
      <div class="nav-btn active">Today</div>
    </div>`;

  app.innerHTML = content;
}

function prevDay() {
  currentDate.setDate(currentDate.getDate() - 1);
  render();
}

function nextDay() {
  currentDate.setDate(currentDate.getDate() + 1);
  render();
}

function showAddModal() {
  const listEl = document.getElementById('exerciseList');
  listEl.innerHTML = '';

  const weekExercises = getWeekExercises();

  weekExercises.forEach(ex => {
    const div = document.createElement('div');
    div.className = 'exercise-option';
    div.textContent = `${ex.name} — ${ex.sets}`;
    div.onclick = () => addExerciseToDay(ex.name, ex.sets, ex.tag);
    listEl.appendChild(div);
  });

  if (weekExercises.length === 0) {
    const empty = document.createElement('div');
    empty.style.padding = '30px 20px';
    empty.style.textAlign = 'center';
    empty.style.color = 'var(--muted)';
    empty.textContent = 'No exercises in this week yet.';
    listEl.appendChild(empty);
  }

  document.getElementById('addModal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('addModal').style.display = 'none';
}

// Initialize
render();
</script>
</body>
</html>
